<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Drako Lair</title>
    <link rel="stylesheet" href="./styles.css?v=drako-lair-game-v12" />
  </head>
  <body>
    <main class="map-shell">
      <canvas id="iso-map" aria-label="Carte isometrique 2.5D Drako Lair"></canvas>

      <header class="hud topbar">
        <div class="brand">
          <span class="crest" aria-hidden="true"></span>
          <div>
            <h1>Drako Lair</h1>
          </div>
        </div>
        <nav class="actions" aria-label="Map controls">
          <button id="reset-view" type="button" title="Recentrer la carte" aria-label="Recentrer la carte">Centre</button>
          <button id="camera-mode" type="button" title="Changer la camera" aria-label="Changer la camera">Vue jeu</button>
          <button id="cycle-point" type="button" title="Secteur suivant" aria-label="Secteur suivant">Suiv.</button>
        </nav>
      </header>

      <aside class="hud inspector" aria-label="Secteur selectionne">
        <p class="micro">Secteur actif</p>
        <h2 id="place-name">The Bent Court</h2>
        <p id="place-type">district central</p>
        <p id="place-function">Hub d'anomalie: ouvre, ferme ou deforme les routes proches.</p>
        <p id="place-copy">
          La premiere cour reste un district local: masques devines dans l'architecture, rift violet, routes croches et matiere vivante.
        </p>
      </aside>

      <aside class="hud minimap-panel" aria-label="Mini map">
        <canvas id="mini-map" width="240" height="150"></canvas>
      </aside>

      <div id="labels" aria-hidden="true"></div>
    </main>

    <script src="./app.js?v=drako-lair-game-v12"></script>
  </body>
</html>
